<!DOCTYPE html>
<html>
<head>
    <title>Get Map Coordinates</title>
    <style>
        body { background: #1a472a; display: flex; justify-content: center; align-items: center; padding: 20px; margin: 0; min-height: 100vh; }
        canvas { 
            border: 3px solid white; 
            cursor: crosshair; 
            max-width: 90vw; 
            max-height: 70vh;
            width: auto;
            height: auto;
            display: block;
            margin: 0 auto;
        }
        .info { background: #2c2b28; color: #ffd966; padding: 15px; margin-top: 20px; border-radius: 20px; font-family: monospace; max-width: 500px; margin: 20px auto; font-size: 14px; }
    </style>
</head>
<body>
<div>
    <canvas id="myCanvas"></canvas>
    <div class="info" id="info">
        👇 Click on these states (in order):<br>
        1. California<br>
        2. Texas<br>
        3. New York<br>
        4. North Dakota<br>
        5. Florida<br>
        <br>
        Write down each X,Y coordinate.
    </div>
</div>
<script>
    const canvas = document.getElementById('myCanvas');
    const ctx = canvas.getContext('2d');
    
    const mapImage = new Image();
    mapImage.src = 'blank_US_states.png';
    
    mapImage.onload = () => {
        canvas.width = mapImage.width;
        canvas.height = mapImage.height;
        ctx.drawImage(mapImage, 0, 0);
        ctx.font = "24px Arial";
        ctx.fillStyle = "red";
        ctx.fillText("Click on California", 50, 80);
    };
    
    let clickCount = 0;
    const states = ["California", "Texas", "New York", "North Dakota", "Florida"];
    
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = Math.round((e.clientX - rect.left) * scaleX);
        const y = Math.round((e.clientY - rect.top) * scaleY);
        
        const infoDiv = document.getElementById('info');
        infoDiv.innerHTML += `<br>✅ ${states[clickCount]}: X=${x}, Y=${y}`;
        
        clickCount++;
        if (clickCount < states.length) {
            ctx.fillStyle = "red";
            ctx.fillText(`Click on ${states[clickCount]}`, 50, 80 + (clickCount * 50));
        } else {
            ctx.fillStyle = "green";
            ctx.fillText("Done! Give me these coordinates.", 50, 80 + (clickCount * 50));
        }
    });
    
    mapImage.onerror = () => {
        document.getElementById('info').innerHTML = "❌ Map image not found! Make sure blank_US_states.png is in the same folder.";
    };
</script>
</body>
</html>
