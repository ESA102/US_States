<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>US States Challenge</title>
    <style>
        * { user-select: none; box-sizing: border-box; }
        body {
            background: linear-gradient(145deg, #1a472a, #0e2a1a);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .game {
            background: #f5f2e8;
            border-radius: 30px;
            padding: 20px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
        }
        .score-box {
            background: #2c2b28;
            padding: 8px 20px;
            border-radius: 50px;
            color: #ffd966;
            font-weight: bold;
            font-size: 1.5rem;
        }
        .target {
            background: #3b2a1f;
            padding: 10px 25px;
            border-radius: 50px;
            color: white;
            font-size: 1.3rem;
        }
        .state-name { color: #ffaa33; font-weight: bold; font-size: 1.8rem; }
        .states-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin: 20px 0;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }
        .state-btn {
            background: #6b4c2c;
            color: white;
            padding: 10px;
            border-radius: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.1s;
            font-weight: bold;
        }
        .state-btn:hover { background: #8b6c3c; transform: scale(1.02); }
        .state-btn.correct { background: #2f6b3c; }
        .state-btn.wrong { background: #8b3c2c; }
        .message {
            padding: 12px;
            border-radius: 50px;
            text-align: center;
            font-size: 1.1rem;
            margin: 10px 0;
            font-weight: bold;
        }
        .message-info { background: #e8e0c8; color: #2c2b28; border: 2px solid #c9b27c; }
        .perfect { background: #a5d6a5; color: #1a472a; border: 2px solid #2f6b3c; }
        .good { background: #c8e6c8; color: #1a472a; border: 2px solid #4a8c3a; }
        .miss { background: #ffb3b3; color: #8b0000; border: 2px solid #cc0000; }
        .progress {
            text-align: center;
            font-size: 1rem;
            margin-top: 10px;
            font-weight: bold;
            color: #2c2b28;
            background: #ddd0a8;
            padding: 8px;
            border-radius: 30px;
        }
        .button-group { display: flex; gap: 15px; margin-top: 15px; justify-content: center; }
        button {
            background: #d9a13b;
            border: none;
            padding: 10px 25px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            color: #2c2b28;
            flex: 1;
        }
        button:active { transform: scale(0.98); }
        #shareBtn { background: #25D366; color: white; }
        .points-breakdown {
            background: #2c2b28;
            border-radius: 20px;
            padding: 10px;
            margin-top: 10px;
            color: #ffd966;
            font-size: 0.75rem;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
        }
        .points-breakdown span { color: white; }
        @media (max-width: 700px) {
            .state-name { font-size: 1.3rem; }
            .states-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
            .state-btn { font-size: 12px; padding: 8px; }
        }
    </style>
</head>
<body>
<div class="game">
    <div class="header">
        <div class="score-box">🏆 SCORE: <span id="score">0</span> / 1000</div>
        <div class="target">🇺🇸 FIND: <span class="state-name" id="targetState">Loading...</span></div>
    </div>
    
    <div class="states-grid" id="statesGrid"></div>
    
    <div class="message message-info" id="message">Click on the correct state button!</div>
    <div class="progress" id="progress">Question 1 of 5</div>
    
    <div class="points-breakdown">
        <div>🎯 Correct: <span>200 pts</span></div>
        <div>⚠️ Wrong: <span>0 pts</span></div>
    </div>
    
    <div class="button-group">
        <button id="resetBtn">🔄 PLAY AGAIN</button>
        <button id="shareBtn">📤 SHARE</button>
    </div>
</div>

<script>
    // All 50 US states
    const allStates = [
        "Alabama", "Alaska", "Arizona", "Arkansas", "California", "Colorado", "Connecticut", "Delaware",
        "Florida", "Georgia", "Hawaii", "Idaho", "Illinois", "Indiana", "Iowa", "Kansas", "Kentucky",
        "Louisiana", "Maine", "Maryland", "Massachusetts", "Michigan", "Minnesota", "Mississippi",
        "Missouri", "Montana", "Nebraska", "Nevada", "New Hampshire", "New Jersey", "New Mexico",
        "New York", "North Carolina", "North Dakota", "Ohio", "Oklahoma", "Oregon", "Pennsylvania",
        "Rhode Island", "South Carolina", "South Dakota", "Tennessee", "Texas", "Utah", "Vermont",
        "Virginia", "Washington", "West Virginia", "Wisconsin", "Wyoming"
    ];
    
    let currentRound = [];
    let currentIndex = 0;
    let currentState = null;
    let totalScore = 0;
    let gameActive = true;
    let answered = false;
    let questionPoints = [];
    
    const DAILY_KEY = 'us_states_quiz_daily';
    
    function getDailySeed() {
        const today = new Date();
        return today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
    }
    
    function seededRandom(seed) {
        let s = seed;
        return function() {
            s = (s * 1103515245 + 12345) & 0x7fffffff;
            return s / 0x7fffffff;
        };
    }
    
    function seededShuffle(arr, seed) {
        const rng = seededRandom(seed);
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(rng() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }
    
    function getDailyStates() {
        const seed = getDailySeed();
        const shuffled = seededShuffle([...allStates], seed);
        return shuffled.slice(0, 5);
    }
    
    function checkDailyLimit() {
        const today = new Date().toDateString();
        const saved = localStorage.getItem(DAILY_KEY);
        if (saved) {
            const data = JSON.parse(saved);
            if (data.date === today) {
                return { allowed: false, score: data.score };
            }
        }
        return { allowed: true, score: null };
    }
    
    function saveDailyScore(score) {
        const today = new Date().toDateString();
        localStorage.setItem(DAILY_KEY, JSON.stringify({ date: today, score: score }));
    }
    
    function showDailyLimitOverlay(score) {
        alert(`⏰ You've already played today!\nYour score: ${score} / 1000\nCome back tomorrow for a new challenge!`);
    }
    
    function createStateButtons() {
        const grid = document.getElementById('statesGrid');
        grid.innerHTML = '';
        const shuffled = [...allStates].sort(() => Math.random() - 0.5);
        shuffled.forEach(state => {
            const btn = document.createElement('div');
            btn.className = 'state-btn';
            btn.textContent = state;
            btn.onclick = () => checkAnswer(state, btn);
            grid.appendChild(btn);
        });
    }
    
    function checkAnswer(selectedState, btnElement) {
        if (!gameActive || answered) return;
        
        const isCorrect = (selectedState === currentState);
        const points = isCorrect ? 200 : 0;
        
        totalScore += points;
        questionPoints[currentIndex] = points;
        document.getElementById('score').innerText = totalScore;
        
        if (isCorrect) {
            btnElement.classList.add('correct');
            document.getElementById('message').className = "message perfect";
            document.getElementById('message').innerHTML = "✅ CORRECT! +200 points! ✅";
        } else {
            btnElement.classList.add('wrong');
            document.getElementById('message').className = "message miss";
            document.getElementById('message').innerHTML = `❌ WRONG! The correct state was ${currentState}. +0 points ❌`;
        }
        
        answered = true;
        
        setTimeout(() => {
            currentIndex++;
            if (currentIndex < currentRound.length) {
                loadNextQuestion();
            } else {
                endGame();
            }
        }, 1500);
    }
    
    function loadNextQuestion() {
        answered = false;
        currentState = currentRound[currentIndex];
        document.getElementById('targetState').innerText = currentState;
        document.getElementById('progress').innerHTML = `📍 Question ${currentIndex + 1} of ${currentRound.length}`;
        document.getElementById('message').className = "message message-info";
        document.getElementById('message').innerHTML = "Click on the correct state button!";
        
        // Reset button colors
        document.querySelectorAll('.state-btn').forEach(btn => {
            btn.classList.remove('correct', 'wrong');
        });
    }
    
    function endGame() {
        gameActive = false;
        saveDailyScore(totalScore);
        document.getElementById('message').className = "message message-info";
        document.getElementById('message').innerHTML = `🎉 GAME COMPLETE! 🎉<br>⭐ Final Score: ${totalScore} / 1000 ⭐`;
        document.getElementById('progress').innerHTML = "🏁 Come back tomorrow for a new challenge! 🏁";
    }
    
    function getShareMessage() {
        const now = new Date();
        const month = now.toLocaleString('default', { month: 'short' });
        const day = now.getDate();
        const dateString = `${month} ${day}`;
        let scoreLine = "";
        for (let i = 0; i < questionPoints.length; i++) {
            let icon = questionPoints[i] >= 200 ? "✅" : "❌";
            scoreLine += `${questionPoints[i]}${icon} `;
        }
        scoreLine = scoreLine.trim();
        return `https://ESA102.github.io/GameArcade/ ${dateString}\n${scoreLine}\nFinal score: ${totalScore}`;
    }
    
    function shareScore() {
        const message = getShareMessage();
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        if (isMobile && navigator.share) {
            navigator.share({ title: 'My US States Challenge Score', text: message }).catch(() => { copyToClipboard(message); });
        } else {
            copyToClipboard(message);
        }
    }
    
    function copyToClipboard(message) {
        navigator.clipboard.writeText(message).then(() => {
            const msgDiv = document.getElementById('message');
            const original = msgDiv.innerHTML;
            msgDiv.innerHTML = "📋 Score copied to clipboard!";
            setTimeout(() => { msgDiv.innerHTML = original; }, 2000);
        });
    }
    
    function resetGame() {
        const dailyCheck = checkDailyLimit();
        if (!dailyCheck.allowed) {
            showDailyLimitOverlay(dailyCheck.score);
            return;
        }
        
        gameActive = true;
        totalScore = 0;
        currentIndex = 0;
        answered = false;
        questionPoints = [];
        document.getElementById('score').innerText = "0";
        
        currentRound = getDailyStates();
        const stateNames = currentRound.map(s => s.name).join(', ');
        document.getElementById('progress').innerHTML = `📍 Question 1 of 5`;
        document.getElementById('message').className = "message message-info";
        document.getElementById('message').innerHTML = "Click on the correct state button!";
        
        createStateButtons();
        loadNextQuestion();
    }
    
    // Initialize
    const dailyCheck = checkDailyLimit();
    if (!dailyCheck.allowed) {
        showDailyLimitOverlay(dailyCheck.score);
        gameActive = false;
        document.getElementById('statesGrid').innerHTML = '<div style="text-align:center; padding:20px;">Come back tomorrow for a new challenge!</div>';
    } else {
        createStateButtons();
        currentRound = getDailyStates();
        loadNextQuestion();
    }
    
    document.getElementById('resetBtn').addEventListener('click', resetGame);
    document.getElementById('shareBtn').addEventListener('click', shareScore);
</script>
</body>
</html>
