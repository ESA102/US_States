<!DOCTYPE html>
<html>
<head>
    <title>Get Map Coordinates - NO DISTORTION</title>
    <style>
        body { background: #1a472a; display: flex; justify-content: center; padding: 20px; }
        canvas { border: 3px solid white; cursor: crosshair; }
        .info { background: #2c2b28; color: #ffd966; padding: 15px; margin-top: 20px; border-radius: 20px; font-family: monospace; max-width: 800px; }
    </style>
</head>
<body>
<div>
    <canvas id="myCanvas" width="3024" height="1964"></canvas>
    <div class="info" id="info">
        👇 Click on these states:<br>
        1. California<br>
        2. Texas<br>
        3. New York<br>
        4. North Dakota<br>
        5. Florida<br>
        <br>
        Write down each X,Y coordinate.
    </div>
</div>
<script>
    const canvas = document.getElementById('myCanvas');
    const ctx = canvas.getContext('2d');
    
    // EXACT dimensions - NO CSS scaling, NO distortion
    canvas.width = 3024;
    canvas.height = 1964;
    
    const mapImage = new Image();
    mapImage.src = 'blank_US_states.png';
    
    mapImage.onload = () => {
        ctx.drawImage(mapImage, 0, 0, 3024, 1964);
        ctx.font = "30px Arial";
        ctx.fillStyle = "red";
        ctx.fillText("Click on California", 50, 80);
    };
    
    let clickCount = 0;
    const states = ["California", "Texas", "New York", "North Dakota", "Florida"];
    
    canvas.addEventListener('click', (e) => {
        const x = e.offsetX;
        const y = e.offsetY;
        
        const infoDiv = document.getElementById('info');
        infoDiv.innerHTML += `<br>✅ ${states[clickCount]}: X=${x}, Y=${y}`;
        
        clickCount++;
        if (clickCount < states.length) {
            ctx.fillStyle = "red";
            ctx.fillText(`Click on ${states[clickCount]}`, 50, 80 + (clickCount * 50));
        } else {
            ctx.fillStyle = "green";
            ctx.fillText("Done! Give me these 5 coordinates.", 50, 80 + (clickCount * 50));
        }
    });
    
    mapImage.onerror = () => {
        document.getElementById('info').innerHTML = "❌ Map image not found! Make sure blank_US_states.png is in the same folder.";
    };
</script>
</body>
</html>
