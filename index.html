<!DOCTYPE html>
<html>
<head>
    <title>Get Coordinates</title>
    <style>
        body { background: #1a472a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .container { text-align: center; }
        canvas { border: 3px solid white; cursor: crosshair; max-width: 95vw; max-height: 80vh; width: auto; height: auto; }
        .info { background: #2c2b28; color: #ffd966; padding: 15px; margin-top: 20px; border-radius: 20px; font-family: monospace; display: inline-block; text-align: left; }
    </style>
</head>
<body>
<div class="container">
    <canvas id="myCanvas"></canvas>
    <div class="info" id="info">
        Click on these 5 states (in order):<br>
        1. California<br>
        2. Texas<br>
        3. New York<br>
        4. North Dakota<br>
        5. Florida<br>
        <br>
        <span id="result"></span>
    </div>
</div>
<script>
    const canvas = document.getElementById('myCanvas');
    const ctx = canvas.getContext('2d');
    const mapImage = new Image();
    mapImage.src = 'blank_US_states.png';
    
    let clicks = [];
    const states = ["California", "Texas", "New York", "North Dakota", "Florida"];
    
    mapImage.onload = () => {
        canvas.width = mapImage.width;
        canvas.height = mapImage.height;
        ctx.drawImage(mapImage, 0, 0);
        ctx.font = "30px Arial";
        ctx.fillStyle = "red";
        ctx.fillText("Click on California", 50, 80);
    };
    
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const x = Math.round((e.clientX - rect.left) * scaleX);
        const y = Math.round((e.clientY - rect.top) * scaleY);
        
        clicks.push({ state: states[clicks.length], x: x, y: y });
        
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = clicks.map(c => `${c.state}: X=${c.x}, Y=${c.y}`).join('<br>');
        
        if (clicks.length < 5) {
            ctx.fillStyle = "red";
            ctx.fillText(`Click on ${states[clicks.length]}`, 50, 80 + (clicks.length * 50));
        } else {
            ctx.fillStyle = "green";
            ctx.fillText("DONE! Copy the 5 coordinates above.", 50, 80 + (clicks.length * 50));
        }
    });
    
    mapImage.onerror = () => {
        document.getElementById('info').innerHTML = "ERROR: blank_US_states.png not found!";
    };
</script>
</body>
</html>
