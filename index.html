<!DOCTYPE html>
<html>
<head>
    <title>Get Map Coordinates</title>
    <style>
        body { background: #1a472a; display: flex; justify-content: center; padding: 20px; }
        canvas { border: 3px solid white; cursor: crosshair; max-width: 100%; height: auto; }
        .info { background: #2c2b28; color: #ffd966; padding: 15px; margin-top: 20px; border-radius: 20px; font-family: monospace; }
    </style>
</head>
<body>
<div>
    <canvas id="myCanvas" width="1024" height="500"></canvas>
    <div class="info" id="info">👇 Click on California, Texas, and New York. Write down the X and Y numbers.</div>
</div>
<script>
    const canvas = document.getElementById('myCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 1024;
    canvas.height = 500;
    
    const mapImage = new Image();
    mapImage.src = 'blank_US_states.png';
    
    mapImage.onload = () => {
        ctx.drawImage(mapImage, 0, 0, 1024, 500);
        ctx.font = "18px Arial";
        ctx.fillStyle = "red";
        ctx.fillText("Click on California, Texas, and New York", 50, 50);
    };
    
    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = Math.round((e.clientX - rect.left) * (canvas.width / rect.width));
        const y = Math.round((e.clientY - rect.top) * (canvas.height / rect.height));
        const infoDiv = document.getElementById('info');
        infoDiv.innerHTML += `<br>📍 ${new Date().toLocaleTimeString()} - X=${x}, Y=${y}`;
    });
</script>
</body>
</html>
